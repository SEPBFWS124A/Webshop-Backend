# ── Server ──────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/webshop}
spring.datasource.username=${DB_USERNAME:webshop}
spring.datasource.password=${DB_PASSWORD:localdev}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
# Flyway owns the schema — Hibernate must not touch it.
# ddl-auto=validate would fail on startup with PostgreSQL custom enum types (user_role, order_status, etc.)
# because Hibernate maps @Enumerated(STRING) as varchar but the DB column has a native enum type.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:fallback-secret-change-in-production-32chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── Mail ────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Ollama ──────────────────────────────────────────────────────────────────
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:gemma4:e4b}

# ── OpenAPI ─────────────────────────────────────────────────────────────────
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs

# ── Actuator / Management ────────────────────────────────────────────────────
# Runs on a separate internal port — never mapped to a public Docker port.
management.server.port=8081
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always

# ── Alerting thresholds ──────────────────────────────────────────────────────
alert.admin-email=${ALERT_ADMIN_EMAIL:}
alert.error-rate.threshold=${ALERT_ERROR_RATE_THRESHOLD:10}
alert.heap-usage.threshold-percent=${ALERT_HEAP_USAGE_THRESHOLD_PERCENT:85}
