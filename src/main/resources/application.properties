# ── Server ──────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── Database ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/webshop}
spring.datasource.username=${DB_USERNAME:webshop}
spring.datasource.password=${DB_PASSWORD:localdev}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────────────
# Flyway owns the schema — Hibernate must not touch it.
# ddl-auto=validate would fail on startup with PostgreSQL custom enum types (user_role, order_status, etc.)
# because Hibernate maps @Enumerated(STRING) as varchar but the DB column has a native enum type.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ─────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:fallback-secret-change-in-production-32chars}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ── CORS ────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── Mail ────────────────────────────────────────────────────────────────────
# Gmail: MAIL_HOST=smtp.gmail.com, MAIL_PORT=587, MAIL_USERNAME/PASSWORD=<App-Passwort>
# Local dev: defaults point to Mailpit on localhost:1025 (no auth needed)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}
app.mail.from=${MAIL_FROM:noreply@webshop.local}

# ── Ollama ──────────────────────────────────────────────────────────────────
ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:gemma4:e4b}

# ── OpenAPI ─────────────────────────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs

# ── Actuator / Management ────────────────────────────────────────────────────
# Runs on a separate internal port — never mapped to a public Docker port.
management.server.port=8081
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always

# ── Alerting ─────────────────────────────────────────────────────────────────
# Kommagetrennte Liste von Empfängern. Falls nicht gesetzt: MAIL_USERNAME (self-send).
alert.admin-email=${ALERT_ADMIN_EMAIL:${spring.mail.username:}}
# Alert wenn mehr als 5 HTTP-5xx-Fehler in 15 Minuten auftreten.
alert.error-rate.threshold=${ALERT_ERROR_RATE_THRESHOLD:5}
# Alert wenn JVM-Heap dauerhaft über 80 % liegt (gibt Zeit zu reagieren, bevor OOM droht).
alert.heap-usage.threshold-percent=${ALERT_HEAP_USAGE_THRESHOLD_PERCENT:80}
