services:
  postgres:
    image: postgres:16-alpine
    container_name: webshop-postgres
    environment:
      POSTGRES_DB: webshop
      POSTGRES_USER: webshop
      POSTGRES_PASSWORD: ${DB_PASSWORD:-localdev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webshop"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: webshop-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: .
    container_name: webshop-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/webshop
      SPRING_DATASOURCE_USERNAME: webshop
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-localdev}
      APP_JWT_SECRET: ${JWT_SECRET:-fallback-secret-change-in-production-32chars}
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SPRING_MAIL_HOST: ${MAIL_HOST:-localhost}
      SPRING_MAIL_PORT: ${MAIL_PORT:-1025}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
